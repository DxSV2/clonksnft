        body {
            background: #0a4d6b;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;

            font-family: 'Courier New', 'Lucida Console', monospace;
            overflow: hidden;
            image-rendering: pixelated;
            padding: 15px;
            position: relative;
        }

        /* Grid Background */
        .grid {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,255,200,0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,200,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 35s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .container { text-align: center; max-width: 640px; width: 100%; z-index: 2; }

        /* Logo Animation */
        .logo {
            max-width: 100%;
            width: 560px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border: 8px solid #000;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.4);
            animation: logoAnim 3.5s ease-in-out infinite alternate;
        }

        @keyframes logoAnim {
            from { 
                transform: scale(1) rotate(-1deg); 
                box-shadow: 0 0 20px rgba(0, 255, 200, 0.4); 
            }
            to { 
                transform: scale(1.04) rotate(1deg); 
                box-shadow: 0 0 60px rgba(0, 255, 200, 0.85); 
            }
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLONKS NFT</title>
    <style>
        body {
            background: #0a4d6b;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', 'Lucida Console', monospace;
            overflow: hidden;
            image-rendering: pixelated;
            padding: 15px;
            position: relative;
        }

        .container {
            text-align: center;
            max-width: 640px;
            width: 100%;
            z-index: 2;
        }

        /* Logo Animation */
        .logo {
            max-width: 100%;
            width: 560px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border: 8px solid #000;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.4);
            animation: logoGlow 4s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from { box-shadow: 0 0 20px rgba(0, 255, 200, 0.4); }
            to   { box-shadow: 0 0 50px rgba(0, 255, 200, 0.8); }
        }

        .clonks-text {
            font-size: 68px;
            font-weight: bold;
            color: #f5e8c7;
            text-shadow: 6px 6px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
            letter-spacing: 4px;
            margin: 8px 0 8px;
            animation: textPulse 3s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        .subtitle { 
            font-size: 21px; 
            color: #00ffcc; 
            margin: 10px 0 20px; 
            text-shadow: 3px 3px 0 #000;
        }

        .mint-soon { 
            font-size: 29px; 
            color: #ffff00; 
            margin: 20px 0 35px; 
            text-shadow: 4px 4px 0 #000;
            animation: mintFlash 2s infinite;
        }

        @keyframes mintFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .btn {
            font-size: 18px;
            padding: 16px 40px;
            border: 4px solid #f5e8c7;
            background: transparent;
            color: white;
            font-weight: bold;
            width: 100%;
            max-width: 300px;
            cursor: default;
            transition: all 0.4s;
        }

        .btn:hover {
            background: #f5e8c7;
            color: #0a4d6b;
            transform: scale(1.05);
        }

        .description {
            margin: 30px 0;
            line-height: 1.6;
            font-size: 17px;
            color: #ddd;
            padding: 0 10px;
        }

        .social {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .social a {
            transition: transform 0.3s;
        }

        .social a:hover {
            transform: scale(1.2) rotate(8deg);
        }

        .footer {
            margin-top: 50px;
            color: #88aabb;
            font-size: 15px;
        }

        /* Pixel Rain Animation */
        .pixels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .pixel {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00ffcc;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/DxSV2/clonksnft/main/IMG_20260511_051854.png" class="logo" alt="CLONKS">
        <div class="clonks-text">CLONKS</div>
        <p class="subtitle">FULLY ONCHAIN PIXEL ART NFT</p>
        <p class="mint-soon">MINT COMING SOON</p>

        <div>
            <button class="btn">About</button>
        </div>

        <p class="description">
            Clonks is a unique fully on-chain pixel art NFT collection. 
            Each Clonk features strong street culture vibes, bold attitude, 
            and a distinctive retro-futuristic style. Built completely on the blockchain.
        </p>

        <div class="social">
            <a href="https://x.com/clonksnft" target="_blank" style="font-size:55px; text-decoration:none; color:#fff;">𝕏</a>
            <a href="#" onclick="alert('OpenSea Coming Soon! 🔥'); return false;">
                <img src="https://static.seadn.io/logos/OpenSea-Full-Logo%20(dark).png" width="145" alt="OpenSea">
            </a>
        </div>

        <div class="footer">
            ©2026 Clonks. All rights reserved
        </div>
    </div>

    <!-- Pixel Rain -->
    <div class="pixels" id="pixels"></div>

    <script>
        function createPixel() {
            const pixel = document.createElement('div');
            pixel.classList.add('pixel');
            pixel.style.left = Math.random() * 100 + 'vw';
            pixel.style.animationDuration = (Math.random() * 4 + 3) + 's';
            pixel.style.opacity = Math.random() * 0.7 + 0.3;
            document.getElementById('pixels').appendChild(pixel);
            setTimeout(() => pixel.remove(), 8000);
        }

        // Mulai animasi
        setInterval(createPixel, 60);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLONKS NFT</title>
    <style>
        body {
            background: #0a0a0f;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            image-rendering: pixelated;
        }
        .container {
            text-align: center;
        }
        .logo {
            max-width: 620px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border: 8px solid #000;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }
        .clonks-text {
            font-size: 88px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 
                6px 6px 0 #000,
                -3px -3px 0 #000,
                3px -3px 0 #000,
                -3px 3px 0 #000;
            letter-spacing: 6px;
            margin: 10px 0 8px;
        }
        .subtitle {
            font-size: 26px;
            color: #00ffff;
            margin: 10px 0 30px;
            text-shadow: 3px 3px 0 #000;
        }
        .mint-soon {
            font-size: 38px;
            color: #ffff00;
            margin: 25px 0 50px;
            text-shadow: 4px 4px 0 #000;
        }
        .btn {
            font-size: 20px;
            padding: 16px 48px;
            margin: 12px;
            border: 4px solid #ff00ff;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #ff00ff;
            color: black;
            transform: scale(1.05);
        }
        .btn-mint {
            background: #ff00ff;
            color: black;
            border-color: #ff00ff;
        }
        .social {
            margin-top: 60px;
        }
        .social a {
            margin: 0 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <img src="https://raw.githubusercontent.com/DxSV2/clonksnft/main/IMG_20260511_051854.png" 
             class="logo" alt="CLONKS">

        <div class="clonks-text">CLONKS</div>
        
        <p class="subtitle">FULLY ONCHAIN PIXEL ART NFT</p>
        <p class="mint-soon">MINT COMING SOON</p>

        <div>
            <button class="btn">Connect Wallet</button>
            <button class="btn btn-mint">Mint Clonk</button>
        </div>

        <!-- Social Media -->
        <div class="social">
            <a href="https://x.com/clonksnft" target="_blank">
                <img src="https://win98icons.alexmeub.com/icons/png/internet_mail-4.png" width="52" alt="X">
            </a>
            <a href="#" onclick="alert('OpenSea Coming Soon! 🔥'); return false;">
                <img src="https://static.seadn.io/logos/OpenSea-Full-Logo%20(dark).png" width="160" alt="OpenSea">
            </a>
        </div>

        <p style="margin-top: 80px; color: #555; font-size: 16px;">
            © 2026 CLONKS NFT — All Rights Reserved
        </p>

    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLONKS NFT</title>
    <style>
        body {
            background: #0a4d6b;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            image-rendering: pixelated;
            padding: 15px;
            position: relative;
        }

        .grid {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,255,200,0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,200,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 40s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .container { 
            text-align: center; 
            max-width: 640px; 
            width: 100%; 
            z-index: 2; 
        }

        .logo {
            max-width: 100%;
            width: 560px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border: 8px solid #000;
            animation: logoAnim 4s ease-in-out infinite alternate;
        }

        @keyframes logoAnim {
            from { transform: scale(1); }
            to   { transform: scale(1.04); }
        }

        .clonks-text {
            font-size: 68px;
            font-weight: bold;
            color: #f5e8c7;
            text-shadow: 6px 6px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
            letter-spacing: 4px;
            margin: 8px 0;
        }

        .subtitle { font-size: 21px; color: #00ffcc; margin: 10px 0 20px; }
        .mint-soon { font-size: 29px; color: #ffff00; margin: 20px 0 35px; }

        .btn {
            font-size: 18px;
            padding: 16px 40px;
            border: 4px solid #f5e8c7;
            background: transparent;
            color: white;
            font-weight: bold;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            display: block;
        }

        .description {
            margin: 30px 0;
            line-height: 1.6;
            font-size: 17px;
            color: #ddd;
        }

        .social {
            margin-top: 40px;
            font-size: 55px;
        }

        .footer {
            margin-top: 50px;
            color: #88aabb;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="grid"></div>

    <div class="container">
        <img src="https://raw.githubusercontent.com/DxSV2/clonksnft/main/IMG_20260511_051854.png" class="logo" alt="CLONKS">
        <div class="clonks-text">CLONKS</div>
        
        <p class="subtitle">FULLY ONCHAIN PIXEL ART NFT</p>
        <p class="mint-soon">MINT COMING SOON</p>

        <button class="btn">About</button>

        <p class="description">
            Clonks is a unique fully on-chain pixel art NFT collection. 
            Each Clonks features strong street culture vibes, bold attitude, 
            and a distinctive retro-futuristic style. Built completely on the blockchain.
        </p>

        <div class="social">
            <a href="https://x.com/clonksnft" target="_blank" style="color:#fff; text-decoration:none;">𝕏</a>
        </div>

        <div class="footer">
            ©2026 Clonks. All rights reserved
        </div>
    </div>
</body>
</html>

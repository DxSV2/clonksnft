<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLONKS NFT</title>
    <style>
        body {
            background: #0a4d6b; /* Warna biru background logo */
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', 'Lucida Console', monospace;
            overflow: hidden;
            image-rendering: pixelated;
            padding: 15px;
        }
        .container {
            text-align: center;
            max-width: 640px;
            width: 100%;
        }
        .logo {
            max-width: 100%;
            width: 560px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border: 8px solid #000;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.4);
        }
        .clonks-text {
            font-size: 68px;
            font-weight: bold;
            color: #f5e8c7; /* Warna cream seperti di logo */
            text-shadow: 
                6px 6px 0 #000,
                -3px -3px 0 #000,
                3px -3px 0 #000,
                -3px 3px 0 #000;
            letter-spacing: 4px;
            margin: 8px 0 8px;
            line-height: 1;
        }
        .subtitle {
            font-size: 21px;
            color: #00ffcc;
            margin: 10px 0 20px;
            text-shadow: 3px 3px 0 #000;
        }
        .mint-soon {
            font-size: 29px;
            color: #ffff00;
            margin: 25px 0 40px;
            text-shadow: 4px 4px 0 #000;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin: 10px 0 30px;
        }
        .btn {
            font-size: 18px;
            padding: 16px 40px;
            border: 4px solid #f5e8c7;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            max-width: 300px;
        }
        .btn:hover {
            background: #f5e8c7;
            color: #0a4d6b;
        }
        .btn-mint {
            background: #f5e8c7;
            color: #0a4d6b;
        }
        .social {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
        }
        .footer {
            margin-top: 60px;
            color: #88aabb;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <img src="https://raw.githubusercontent.com/DxSV2/clonksnft/main/IMG_20260511_051854.png" 
             class="logo" alt="CLONKS">

        <div class="clonks-text">CLONKS</div>
        
        <p class="subtitle">FULLY ONCHAIN PIXEL ART NFT</p>
        <p class="mint-soon">MINT COMING SOON</p>

        <div class="buttons">
            <button class="btn">Connect Wallet</button>
            <button class="btn btn-mint">Mint Clonks</button>
        </div>

        <!-- Social -->
        <div class="social">
            <a href="https://x.com/clonksnft" target="_blank" style="font-size:55px; text-decoration:none; color:#fff;">
                𝕏
            </a>
            <a href="#" onclick="alert('OpenSea Coming Soon! 🔥'); return false;">
                <img src="https://static.seadn.io/logos/OpenSea-Full-Logo%20(dark).png" width="145" alt="OpenSea">
            </a>
        </div>

        <div class="footer">
            ©2026 Clonks. All rights reserved
        </div>

    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLONKS NFT</title>
    <style>
        body {
            background: #0a0a0f;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            image-rendering: pixelated;
            padding: 20px 10px;
        }
        .container {
            text-align: center;
            max-width: 640px;
            width: 100%;
        }
        .logo {
            max-width: 100%;
            width: 580px;
            image-rendering: pixelated;
            margin-bottom: 10px;
            border: 8px solid #000;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }
        .clonks-text {
            font-size: 78px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 
                6px 6px 0 #000,
                -3px -3px 0 #000,
                3px -3px 0 #000,
                -3px 3px 0 #000;
            letter-spacing: 4px;
            margin: 8px 0 6px;
        }
        .subtitle {
            font-size: 22px;
            color: #00ffff;
            margin: 8px 0 25px;
            text-shadow: 3px 3px 0 #000;
        }
        .mint-soon {
            font-size: 32px;
            color: #ffff00;
            margin: 20px 0 40px;
            text-shadow: 4px 4px 0 #000;
        }
        .btn {
            font-size: 18px;
            padding: 16px 40px;
            margin: 8px;
            border: 4px solid #ff00ff;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            max-width: 280px;
        }
        .btn:hover {
            background: #ff00ff;
            color: black;
        }
        .btn-mint {
            background: #ff00ff;
            color: black;
        }
        .social {
            margin-top: 50px;
        }
        .social a {
            margin: 0 18px;
            display: inline-block;
        }
        .footer {
            margin-top: 70px;
            color: #555;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <img src="https://raw.githubusercontent.com/DxSV2/clonksnft/main/IMG_20260511_051854.png" 
             class="logo" alt="CLONKS">

        <div class="clonks-text">CLONKS</div>
        
        <p class="subtitle">FULLY ONCHAIN PIXEL ART NFT</p>
        <p class="mint-soon">MINT COMING SOON</p>

        <div>
            <button class="btn">Connect Wallet</button>
            <button class="btn btn-mint">Mint Clonks</button>
        </div>

        <!-- Social Media -->
        <div class="social">
            <a href="https://x.com/clonksnft" target="_blank" style="font-size:48px; text-decoration:none;">
                𝕏
            </a>
            <a href="#" onclick="alert('OpenSea Coming Soon! 🔥'); return false;">
                <img src="https://static.seadn.io/logos/OpenSea-Full-Logo%20(dark).png" width="150" alt="OpenSea">
            </a>
        </div>

        <div class="footer">
            ©2026 Clonks. All rights reserved
        </div>

    </div>
</body>
</html>
